    <script>
      /**
       * Aggressive defensive fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
       * This ensures window.fetch has a setter even if the environment defines it as a read-only getter on the prototype.
       */
      (function() {
        try {
          const originalFetch = window.fetch;
          if (typeof originalFetch === 'function') {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Blocked attempt to overwrite window.fetch. Use the original fetch instead.');
              }
            });
          }
        } catch (e) {
          console.error('Fetch patch failed:', e);
        }
      })();
    </script>
